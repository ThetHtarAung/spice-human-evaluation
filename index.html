<!DOCTYPE html>
<html lang="en">
<head>

  <style>
    * { box-sizing: border-box; }
    :root {
      --bg:#F4F6F8; --card:#fff; --text:#1E2D3D; --muted:#5F6B77;

    }
    body { margin:0; background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif; }
    button,input,select,textarea { font-family:inherit; }
    button:disabled { cursor:not-allowed; }
    input[type=checkbox] { accent-color:var(--accent); }
    input[type=text], input[type=password], select, textarea {
      width:100%; padding:10px 12px; border-radius:var(--radius-sm); border:1px solid var(--border);
      background:#fff; color:var(--text); font-size:14px; outline:none;
    }
    input:focus, select:focus, textarea:focus { border-color:var(--accent); box-shadow:0 0 0 2px rgba(30,45,61,0.12); }
    .page { max-width:980px; margin:0 auto; padding:24px 16px; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:22px; box-shadow:0 1px 8px rgba(0,0,0,0.03); }
    .card + .card { margin-top:14px; }
    .label { font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; }
    h1 { font-size:24px; margin:6px 0 8px; font-weight:650; }
    h2 { font-size:19px; margin:6px 0 8px; font-weight:650; }
    h3 { font-size:15px; margin:0 0 6px; font-weight:650; }
    p { line-height:1.6; }
    .muted { color:var(--muted); font-size:14px; line-height:1.55; }
    .btn-primary { cursor:pointer; padding:10px 22px; border-radius:var(--radius-sm); border:none; background:var(--accent); color:white; font-size:14px; font-weight:600; }
    .btn-secondary { cursor:pointer; padding:10px 18px; border-radius:var(--radius-sm); border:1px solid var(--border); background:white; color:var(--text); font-size:14px; font-weight:500; }
    .grid-3 { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
    .stat { background:var(--light); border-radius:var(--radius-sm); padding:14px; text-align:center; }
    .stat-number { font-size:21px; font-weight:650; margin-bottom:2px; }
    .stat-label { font-size:12px; color:var(--muted); }
    .row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    .row-between { display:flex; justify-content:space-between; align-items:flex-start; gap:12px; }
    .progress-wrap { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
    .progress-bar { flex:1; height:5px; background:var(--border); border-radius:4px; overflow:hidden; }
    .progress-inner { height:100%; background:var(--accent); border-radius:4px; transition:width .25s ease; }
    .storyboard-wrap { width:100%; background:var(--light); border-radius:var(--radius); border:1px solid var(--border); padding:10px; overflow:hidden; }
    .storyboard-img { display:block; width:100%; max-height:78vh; object-fit:contain; background:white; border-radius:var(--radius-sm); }
    .fallback-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; }
    .fallback-shot { background:#DCE8F7; border:1px solid var(--border); border-radius:var(--radius-sm); aspect-ratio:4/3; display:flex; align-items:center; justify-content:center; padding:8px; text-align:center; color:rgba(0,0,0,.5); font-size:11px; font-weight:650; }
    .question { padding:16px 0; border-top:1px solid var(--border); }
    .question:first-child { border-top:none; padding-top:4px; }
    .q-head { display:flex; justify-content:space-between; align-items:flex-start; gap:12px; margin-bottom:10px; }
    .q-title { font-size:14px; font-weight:650; margin-bottom:3px; }
    .q-desc { font-size:12px; color:var(--muted); line-height:1.45; }
    .na-btn { cursor:pointer; flex-shrink:0; font-size:11px; font-weight:700; padding:5px 10px; border-radius:999px; border:1px solid var(--border); background:white; color:var(--muted); }
    .na-btn.active { border-color:var(--accent); background:var(--accent); color:white; }
    .scale { display:grid; grid-template-columns:repeat(5,1fr); gap:7px; }
    .scale.disabled { opacity:.28; pointer-events:none; }
    .scale-btn { cursor:pointer; min-height:58px; padding:7px 4px; border-radius:var(--radius-sm); border:1px solid var(--border); background:var(--light); color:var(--muted); text-align:center; }
    .scale-btn.selected { border:2px solid var(--accent); background:var(--accent); color:white; }
    .scale-num { font-size:17px; font-weight:650; line-height:1.2; }
    .scale-label { font-size:10px; margin-top:3px; line-height:1.15; }
    .notice { background:var(--warning-bg); color:var(--warning-text); border-radius:var(--radius-sm); padding:12px 14px; font-size:13px; line-height:1.5; }
    .success { background:var(--success-bg); color:var(--success-text); border-radius:var(--radius-sm); padding:12px 14px; font-size:13px; line-height:1.5; }
    .error { background:#FDECEA; color:var(--danger); border-radius:var(--radius-sm); padding:12px 14px; font-size:13px; line-height:1.5; }
    table { width:100%; border-collapse:collapse; font-size:12px; }
    th,td { padding:7px 8px; border-bottom:1px solid var(--border); text-align:left; vertical-align:top; }
    th { color:var(--muted); font-weight:650; }
    code { background:var(--light); padding:2px 5px; border-radius:5px; font-size:12px; }
    @media (max-width:700px) { .grid-3{grid-template-columns:1fr;} .scale{grid-template-columns:1fr;} .fallback-grid{grid-template-columns:repeat(3,1fr);} .row-between{flex-direction:column;} }
  </style>
